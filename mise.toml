[env]
_.path = ["./node_modules/.bin"]

[tools]
# Environments
bun = "1.3.14"
aube = "1.26.0"
# Linters & Formatters
hk = "1.50.0"
pkl = "0.32.0"
stylua = "2.5.2"
node = "24"

[deps.bun-aube]
description = "Automatically install dependencies via aube & bun's lockfile."
sources = ["package.json", "bun.lock"]
outputs = ["node_modules/"]
# Because aube's output lockfile has bugs,
# we use `bun install --lockfile-only` to generate a lockfile
run = "bun install --lockfile-only && aube install"
auto = true

[tasks.dev]
run = "tsdown --tsconfig tsconfig.lib.json --watch"

[tasks.build]
run = "tsdown --tsconfig tsconfig.lib.json"

[tasks.start]
run = "bun run ./src/index.ts"

[tasks.check]
depends = "build"
run = "hk check --all"

[tasks.fix]
depends = "build"
run = "hk fix --all"

[tasks.test]
depends = "build"
run = "vitest run"

[tasks."test:watch"]
run = "vitest"

[tasks.prerelease]
run = { tasks = ["check", "test"] }

[tasks.release]
depends = "prerelease"
run = "bumpp"
raw = true

[tasks.changelog]
run = "changelogithub"

[tasks.publish]
run = [
  "bun pm pack --filename release.tgz",
  "npm publish ./release.tgz --access public --tag latest",
]

[tasks."publish:commit"]
run = "pkg-pr-new publish --bun"
