[env]
_.path = [ "./node_modules/.bin" ]

[tools]
bun = "latest"

[tasks.prepare]
run = "mise generate git-pre-commit --write"

[tasks.pre-commit]
run = "nano-staged"

[tasks.dev]
run = "tsdown --tsconfig tsconfig.lib.json --watch"

[tasks.build]
run = "tsdown --tsconfig tsconfig.lib.json --publint --attw.profile esm-only"

[tasks.start]
depends = "bun run ./src/index.ts"

[tasks."lint:oxlint"]
run = "oxlint --config .oxlintrc.json"

[tasks."lint:eslint"]
wait_for = "lint:oxlint"
run = "eslint"

[tasks.lint]
depends = [
  "lint:oxlint",
  "lint:eslint"
]

[tasks."lint:fix:oxlint"]
run = "oxlint --config .oxlintrc.json --fix"

[tasks."lint:fix:eslint"]
wait_for = "lint:fix:oxlint"
run = "eslint --fix"

[tasks."lint:fix"]
depends = [
  "lint:fix:oxlint",
  "lint:fix:eslint"
]

[tasks.typecheck]
run = "tsc --build --noEmit"

[tasks.unused]
run = "knip-bun"

[tasks.check]
depends = [
  "lint",
  "typecheck",
  "unused",
]

[tasks.test]
depends = "build"
run = "bun test"

[tasks.prerelease]
depends = [
  "check",
  "test"
]

[tasks.release]
depends = "prerelease"
run = "bumpp"
raw = true
