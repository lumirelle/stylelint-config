[env]
_.path = [ "./node_modules/.bin" ]

[tools]
bun = "latest"
aube = "latest"
pkl = "latest"
hk = "latest"
"npm:@arethetypeswrong/cli" = "latest"
"npm:publint" = "latest"

[hooks]
enter = "hk install"

[deps.auto-aube]
sources = [
  "package.json",
  "bun.lock"
]
outputs = [ "node_modules/" ]
# Because aube's output lockfile has bugs,
# we use `bun install --lockfile-only` to generate a lockfile
run = "bun install --lockfile-only && aube install"
auto = true

[tasks.pre-commit]
run = "hk run pre-commit"

[tasks.dev]
run = "tsdown --tsconfig tsconfig.lib.json --watch"

[tasks.build]
run = "tsdown --tsconfig tsconfig.lib.json --publint --attw.profile esm-only"

[tasks.start]
run = "bun run ./src/index.ts"

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[tasks.test]
depends = "build"
run = "vitest run"

[tasks."test:watch"]
run = "vitest"

[tasks.prerelease]
run = { tasks = [
  "check",
  "test"
] }

[tasks.release]
depends = "prerelease"
run = "aubx bumpp"
raw = true

[tasks.publish]
run = "aube publish --access public --tag latest"

[tasks."publish:commit"]
run = "aubx pkg-pr-new publish --bun"
