[env]
_.path = [ "./node_modules/.bin" ]

[tools]
bun = "latest"
aube = "latest"

[tasks.prepare]
run = "mise generate git-pre-commit --write"

[tasks.pre-commit]
run = "nano-staged"

[tasks.dev]
run = "aubr dev"

[tasks.build]
run = "aubr build"

[tasks.start]
run = "aubr start"

[tasks.lint]
run = [
  "aubr oxlint",
  "aubr eslint"
]

[tasks."lint:fix"]
run = [
  "aubr oxlint --fix",
  "aubr eslint --fix"
]

[tasks.typecheck]
run = "aubr typecheck"

[tasks.unused]
run = "aubr unused"

[tasks.check]
run = { tasks = [
  "lint",
  "typecheck",
  "unused",
] }

[tasks.test]
depends = "build"
run = "aubr test"

[tasks."test:watch"]
run = "aubr test:watch"

[tasks.prerelease]
run = { tasks = [
  "check",
  "test"
] }

[tasks.release]
depends = "prerelease"
run = "aubr release"
raw = true
