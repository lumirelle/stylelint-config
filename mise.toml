[env]
_.path = [ "./node_modules/.bin" ]

[tools]
# Environments
bun = "latest"
npm = "latest" # Used to release package (trust publisher)
aube = "latest"
# Linters & Formatters
pkl = "latest"
hk = "latest"
"npm:@arethetypeswrong/cli" = "latest"
"npm:publint" = "latest"
# Release
"npm:pkg-pr-new" = "latest"
"npm:bumpp" = "latest"
"npm:changelogithub" = "latest"

[deps.bun-aube]
description = "Automatically install dependencies via aube & bun's lockfile."
sources = [
  "package.json",
  "bun.lock"
]
outputs = [ "node_modules/" ]
# Because aube's output lockfile has bugs,
# we use `bun install --lockfile-only` to generate a lockfile
run = "bun install --lockfile-only && aube install"
auto = true

[tasks.dev]
run = "tsdown --tsconfig tsconfig.lib.json --watch"

[tasks.build]
run = "tsdown --tsconfig tsconfig.lib.json --publint --attw.profile esm-only"

[tasks.start]
run = "bun run ./src/index.ts"

[tasks.check]
depends = "build"
run = "hk check --all"

[tasks.fix]
depends = "build"
run = "hk fix --all"

[tasks.test]
depends = "build"
run = "vitest run"

[tasks."test:watch"]
run = "vitest"

[tasks.prerelease]
run = { tasks = [
  "check",
  "test"
] }

[tasks.release]
depends = "prerelease"
run = "bumpp"
raw = true

[tasks.changelog]
run = "changelogithub"

[tasks.publish]
run = [
  "bun pm pack --filename release.tgz",
  "npm publish ./release.tgz --access public --tag latest"
]

[tasks."publish:commit"]
run = "pkg-pr-new publish --bun"
